[pytest]
# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests

# Markers for test categorization
markers =
    unit: Unit tests (isolated, no external dependencies)
    integration: Integration tests (require Ollama and ChromaDB)
    smoke: Smoke tests (basic import and CLI checks)
    slow: Slow tests (may take > 5 seconds)

# Coverage configuration (baseline for Phase 1)
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Output
console_output_style = progress

# Timeout for tests (10 seconds default)
timeout = 10

# Asyncio mode
asyncio_mode = auto
