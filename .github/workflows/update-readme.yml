name: Update README on Merge

on:
  push:
    branches: [main, master]
    paths:
      - 'CHANGELOG.md'
      - 'core/**'
      - 'agents/**'
      - 'knowledge/**'
      - 'report_generator/**'
      - 'tools/**'
      - 'tasks/**'
      - 'presentation/**'
      - 'process_mining/**'
      - 'tests/**'
      - '.github/scripts/generate_readme.py'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Generate updated README
        run: |
          python .github/scripts/generate_readme.py --update

      - name: Check if there are changes
        id: verify-changed-files
        run: |
          if git diff --quiet README.md README_RU.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md README_RU.md
          git commit -m "docs: auto-update README from CHANGELOG + code state [skip ci]"
          git push

      - name: Report status
        run: |
          if [ "${{ steps.verify-changed-files.outputs.changed }}" = "true" ]; then
            echo "✅ README files updated and committed"
          else
            echo "ℹ️ README files already up-to-date"
          fi
