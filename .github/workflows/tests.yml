name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with flake8 (optional)
        continue-on-error: true
        run: |
          # Only check critical errors, not style warnings
          flake8 core agents tasks tools knowledge --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run unit tests
        env:
          AUDIT_PROFILE: testing
        run: |
          pytest tests/unit tests/smoke -v --tb=short --cov=core --cov=agents --cov=tasks --cov=tools --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest
    # Only run on main/master to save resources
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Start Ollama (mock)
        run: |
          echo "Integration tests require Ollama"
          echo "Skipping integration tests in CI (no Ollama instance)"

      - name: Run integration smoke tests
        env:
          AUDIT_PROFILE: testing
        run: |
          # Just verify imports work
          python -c "from tasks.base_task import AuditTask; from agents.cisa_auditor import CISAAuditor; print('✓ All imports successful')"

  security:
    runs-on: ubuntu-latest
    # Optional: Add security checks
    if: ${{ false }}  # Disabled for now

    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit security check
        continue-on-error: true
        run: |
          pip install bandit
          bandit -r core agents tasks tools -ll
