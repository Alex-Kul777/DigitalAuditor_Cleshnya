name: Validate README

on:
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Check README is up-to-date
        id: check
        run: |
          python .github/scripts/generate_readme.py --check
        continue-on-error: true

      - name: Comment on PR if stale
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **README is out-of-date**\n\nRun `python .github/scripts/generate_readme.py --update` locally and commit the changes.\n\nOr merge this PR and the auto-update workflow will refresh them on main.'
            })

      - name: Fail if README stale
        if: steps.check.outcome == 'failure'
        run: exit 1
